<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Tech Territory Map Leaflet v8</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/></head><body>
<div id="start" class="start"><div class="hero"><div class="brand">Tech Territory Map</div><h1>Find coverage fast</h1><p>Search ZIP, city, state, or territory name.</p><div class="search"><span>⌕</span><input id="homeSearch" placeholder="Search 11230, Brooklyn, NJ, North Jersey..."/><button id="homeBtn">Search</button><button id="homeNewBtn" class="lightBtn">New Search</button></div><div id="homeArchive" class="archive"></div><button id="openDash" class="ghost">Open dashboard</button></div></div>
<div id="app" class="app hidden">
<aside class="left"><div class="logo">⌖ <b>Territory Pro</b></div><button class="nav active" data-tab="overview">1. Map Overview</button><button class="nav" data-tab="groups">2. Tech Groups</button><button class="nav" data-tab="areas">3. Tech Areas</button><button class="nav" data-tab="settings">States: NY NJ DE PA GA</button><div class="small">All changes auto-save in this browser.</div></aside>
<main class="main"><div class="top"><div class="search mini"><span>⌕</span><input id="mapSearch" placeholder="Search ZIP, city, area..."/><button id="mapBtn">Search</button><button id="mapNewBtn" class="lightBtn">New Search</button></div><button id="fitBtn">Fit Areas</button><button id="drawBtn">+ Draw Area</button><button id="finishBtn" class="hidden">Finish</button><button id="cancelDraw" class="hidden">Cancel</button></div><div id="map"></div></main>
<aside class="right"><div id="panel"></div></aside>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="app.js"></script></body></html>
