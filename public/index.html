<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tech Territory Map Google v7</title><link rel="stylesheet" href="/style.css"></head><body>
<section id="start" class="start">
  <div class="hero"><div class="badge">Tech Territory Map</div><h1>Search your coverage</h1><p>Enter ZIP, city, address, territory, or state.</p>
    <div class="googleSearch"><span>⌕</span><input id="homeSearch" placeholder="Search ZIP, city, address..."><button id="homeBtn">Search</button></div>
    <div class="heroActions"><button id="openDash">Open Dashboard</button><button id="homeNewBtn">New Search</button></div>
    <div id="homeArchive" class="archive"></div>
  </div>
</section>
<section id="app" class="app hidden">
  <aside class="side"><div class="brand"><b>Territory Pro</b><span>Google Maps v7</span></div>
    <button class="nav active" data-tab="overview">1. Map Overview</button>
    <button class="nav" data-tab="groups">2. Tech Groups</button>
    <button class="nav" data-tab="areas">3. Tech Areas</button>
    <button class="nav" data-tab="states">States</button>
  </aside>
  <main class="main"><header class="top"><div class="searchbar"><span>⌕</span><input id="mapSearch" placeholder="Search ZIP, city, address..."><button id="mapBtn">Search</button><button id="mapNewBtn">New Search</button></div><div class="topBtns"><button id="fitBtn">Fit Areas</button><button id="drawBtn">Draw Area</button><button id="finishBtn" class="hidden">Finish</button><button id="cancelDraw" class="hidden">Cancel</button></div></header>
    <div class="workspace"><div id="map"></div><aside id="panel" class="panel"></aside></div>
  </main>
</section>
<div id="keyModal" class="modal hidden"><div><h2>Google Maps API key needed</h2><p>Add <b>GOOGLE_MAPS_API_KEY</b> in Render environment variables, then redeploy. The app is ready, but Google Maps needs your key.</p></div></div>
<script src="/config.js"></script><script src="/app.js"></script></body></html>
