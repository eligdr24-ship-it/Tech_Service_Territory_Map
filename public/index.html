<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Tech Territory Map Pro</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/><link rel="stylesheet" href="style.css"/></head><body><div id="app"><aside class="sidebar"><div class="brand"><div class="logo">TT</div><div><h1>Tech Territory</h1><p>Coverage Map Pro v3</p></div></div><div class="searchBox"><input id="searchInput" placeholder="Search ZIP, city, state, address..."/><button id="searchBtn">Search</button></div><div id="searchResult" class="result hidden"></div><nav class="tabs"><button class="tab active" data-tab="states">States</button><button class="tab" data-tab="techs">Techs</button><button class="tab" data-tab="territories">Areas</button><button class="tab" data-tab="tools">Tools</button></nav><section id="states" class="panel active"><h2>Working States</h2><div id="stateList"></div><button id="addStateBtn" class="wide">+ Add State Info</button></section><section id="techs" class="panel"><h2>Technicians</h2><div id="techList"></div><button id="addTechBtn" class="wide">+ Add Technician</button></section><section id="territories" class="panel"><h2>Territories</h2><div id="territoryList"></div><button id="newDrawBtn" class="wide primary">Draw New Area</button></section><section id="tools" class="panel"><h2>Tools</h2><button id="fitBtn" class="wide">Fit to Working Areas</button><button id="streetBtn" class="wide">Street Map</button><button id="satBtn" class="wide">Satellite Map</button><button id="exportJsonBtn" class="wide">Export Backup JSON</button><button id="exportCsvBtn" class="wide">Export CSV</button><label class="file wide">Import Backup JSON<input id="importJson" type="file" accept=".json"/></label><button id="resetDemoBtn" class="wide danger">Reset Demo Data</button><h3>Activity</h3><div id="activityLog"></div></section></aside><main class="main"><header class="topbar"><button id="mobileMenu">☰</button><div><strong>Dashboard</strong><span id="statusText">Auto-saved</span></div><div class="actions"><button id="undoBtn">Undo</button><button id="editMapBtn">Edit Borders</button><button id="deleteSelectedBtn" class="danger">Delete Selected</button><button id="fitTopBtn">Fit Areas</button></div></header><div id="map"></div><div class="bottomCard"><div><b id="selectedTitle">No territory selected</b><p id="selectedInfo">Select an area to edit technicians, priority, ZIPs, cities and notes.</p></div><button id="editSelectedBtn">Edit Selected</button></div></main></div><div id="modal" class="modal hidden"><div class="modalBox"><div class="modalHead"><h2 id="modalTitle">Edit</h2><button id="closeModal">×</button></div><div id="modalBody"></div></div></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script><script src="app.js"></script></body></html>
